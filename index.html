<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glosario</title>
  <style>
    body {
      font-family: Comic Sans MS, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: radial-gradient(circle, rgb(136, 136, 138), green);
    }
    h1 {
      margin-top: 100px;
      font-size: 2em;
    }
    .folder {
      display: inline-block;
      margin: 10px;
      padding: 15px;
      background-color: #f3f3f3;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
      width: 100px; /* Tamaño flexible */
      text-align: center;
      font-size: 1em;
    }
    .audio-container {
      display: none;
      margin-top: 20px;
      padding: 10px;
    }
    audio {
      display: block;
      margin: 10px auto;
      width: 90%;
    }
    .footer {
      margin-top: 100px;
      font-size: 30px;
      color: #131212;
    }

    /* Diseño responsivo con media queries */
    @media (max-width: 600px) {
    h1 {
      font-size: 1.5em;
    }

    .folder {
      width: 80px; /* Reducir el tamaño de las carpetas */
      font-size: 0.9em; /* Texto más pequeño */
    }

    audio {
      width: 100%; /* Ocupa todo el ancho disponible */
    }
   }
  </style>
</head>
<body>
  <h1>Glosario de Informática</h1>
  <div id="folders"></div>
  <div id="audios" class="audio-container"></div>
  <div class="footer">
    <p>Hoyos Ismael Angel</p>
  </div>

  <script>
    // Configuración de las carpetas: nombre visible y audios
    const folderData = [
      {
        name: "A",
        audios: ["Acceso directo.mp3", "Acción.mp3", "Administrador de archivos.mp3"]
      },
      {
        name: "B",
        audios: ["Barra de desplazamiento.mp3", "Barra de dirección.mp3", "Barra de estado.mp3"]
      },
      {
        name: "C",
        audios: ["Caché.mp3", "Camino.mp3", "Campo.mp3"]
      },
      {
        name: "D",
        audios: ["Defragmentación.mp3", "Degradado.mp3", "Diagrama de bloques.mp3"]
      },
      {
        name: "E",
        audios: ["E-mail.mp3", "ENIAC.mp3", "Enlace.mp3"]
      },
      {
        name: "F",
        audios: ["Formateo.mp3", "Formato.mp3", "Fórmula.mp3"]
      },
      {
        name: "G",
        audios: ["Generación de computadoras.mp3", "GIF.mp3", "Gigabyte.mp3"]
      },
      {
        name: "H",
        audios: ["Hardware.mp3", "Hipertexto.mp3", "Hipervínculo.mp3"]
      },
      {
        name: "I",
        audios: ["Icono de documento.mp3", "Icono de grupo.mp3", "Icono de programa.mp3"]
      },
      {
        name: "J",
        audios: ["Java.mp3", "Joystick.mp3", "JPG.mp3"]
      },
      {
        name: "K",
        audios: ["Kilobyte.mp3"]
      },
      {
        name: "L",
        audios: ["LANtastic.mp3", "Lápiz óptico.mp3", "Laptop.mp3"]
      },
      {
        name: "M",
        audios: ["Macrocomputadora.mp3", "MAN.mp3", "Mapa de bits.mp3"]
      },
      {
        name: "N",
        audios: ["Navegador.mp3", "NetBIOS.mp3", "Netiquette.mp3"]
      },
      {
        name: "O",
        audios: ["Objeto.mp3", "Off-line.mp3", "On-line.mp3"]
      },
      {
        name: "P",
        audios: ["Página Web.mp3", "Páginas amarillas.mp3", "Palabra clave.mp3"]
      },
      {
        name: "Q",
        audios: ["QT.mp3", "QWERTY.mp3"]
      },
      {
        name: "R",
        audios: ["RAM.mp3", "Rango o bloque.mp3", "Ratón.mp3"]
      },
      {
        name: "S",
        audios: ["Sangría.mp3", "Sector.mp3", "Selección.mp3"]
      },
      {
        name: "T",
        audios: ["Tabla de contenidos.mp3", "Tabla.mp3", "Tape backup.mp3"]
      },
      {
        name: "U",
        audios: ["Ultra VGA.mp3", "Unidad aritmético-lógica.mp3", "Unidad central de procesamiento.mp3"]
      },
      {
        name: "V",
        audios: ["Variable global.mp3", "Variable local.mp3", "Variable.mp3"]
      },
      {
        name: "W",
        audios: ["WAN.mp3", "Webcasting.mp3", "Windows.mp3"]
      },
      {
        name: "X",
        audios: ["XLS.mp3", "XLW.mp3"]
      },
      {
        name: "Y",
        audios: ["Yellow pages.mp3"]
      },

      // Agrega más carpetas con nombres y audios aquí
    ];

    const folderContainer = document.getElementById("folders");
    const audioContainer = document.getElementById("audios");

    // Crear carpetas dinámicamente
    folderData.forEach((folder, index) => {
      const folderElement = document.createElement("div");
      folderElement.className = "folder";
      folderElement.textContent = folder.name;
      folderElement.onclick = () => showAudios(folder.name, folder.audios);
      folderContainer.appendChild(folderElement);
    });

    // Mostrar audios al hacer clic en una carpeta
    function showAudios(name, audios) {
      audioContainer.innerHTML = `<h2>Audios de la carpeta "${name}"</h2>`;
      audios.forEach((audioSrc, index) => {
        const audio = document.createElement("audio");
        audio.controls = true;
        audio.src = audioSrc;
        const label = document.createElement("p");
        label.textContent = `Audio ${index + 1}`;
        audioContainer.appendChild(audio);
        audioContainer.appendChild(label);
      });
      audioContainer.style.display = "block";
    }
  </script>
</body>
</html>
